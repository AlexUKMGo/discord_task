<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SHITHub - Admin Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="min-h-screen bg-slate-900 text-slate-100 font-sans p-6 sm:p-10">
  
  <header class="mb-10 flex items-center justify-between border-b border-slate-800 pb-5">
    <div>
      <h1 class="text-3xl font-black tracking-tight text-white flex items-center gap-3">
        <svg class="w-8 h-8 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
        Admin Analytics
      </h1>
      <p class="text-slate-400 text-sm mt-1">Real-time user behavior & conversion tracking</p>
    </div>
    <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-colors flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
      Refresh Data
    </button>
  </header>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
      <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Total Discord Users</div>
      <div class="text-4xl font-black text-white" id="valUsers">-</div>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg relative overflow-hidden">
      <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/20 rounded-full blur-xl"></div>
      <div class="text-emerald-400 text-xs font-bold uppercase tracking-wider mb-2 relative z-10">Today's Active (DAU)</div>
      <div class="text-4xl font-black text-emerald-400 relative z-10" id="valDau">-</div>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
      <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Unique Devices</div>
      <div class="text-4xl font-black text-white" id="valDevices">-</div>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
      <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Total Events Logged</div>
      <div class="text-4xl font-black text-white" id="valEvents">-</div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
      <h3 class="text-lg font-bold text-white mb-4">Page Views (Traffic Funnel)</h3>
      <div class="w-full h-64 relative">
        <canvas id="pvChart"></canvas>
      </div>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
      <h3 class="text-lg font-bold text-white mb-4">Avg. Dwell Time (Seconds)</h3>
      <div class="w-full h-64 relative">
        <canvas id="timeChart"></canvas>
      </div>
    </div>
  </div>

  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg">
    <h3 class="text-lg font-bold text-white mb-6">Top 10 Clicked Actions (Conversion Metrics)</h3>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-300">
        <thead class="text-xs uppercase bg-slate-900/50 text-slate-500">
          <tr>
            <th scope="col" class="px-4 py-3 rounded-l-lg">Rank</th>
            <th scope="col" class="px-4 py-3">Action / Target Element</th>
            <th scope="col" class="px-4 py-3 rounded-r-lg text-right">Click Count</th>
          </tr>
        </thead>
        <tbody id="clickTableBody">
          </tbody>
      </table>
    </div>
  </div>

  <script>
    // TODO: 替换为你的 Ngrok API 地址
    const API_URL = "https://noninferable-brigida-vimineous.ngrok-free.dev/api/admin/analytics";
    
    let pvChartInstance = null;
    let timeChartInstance = null;

    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'Inter, sans-serif';

    async function fetchData() {
        try {
            const response = await fetch(API_URL, {
            headers: {
                "ngrok-skip-browser-warning": "true" // 绕过 ngrok 的警告拦截页
            }
            });
            
            if (!response.ok) throw new Error("Network response was not ok");
            
            const data = await response.json();
            renderDashboard(data);
        } catch (err) {
            console.error("Failed to fetch analytics:", err);
            alert("Cannot connect to the backend server or parse data. Please check Python console.");
        }
        }

    function renderDashboard(data) {
      // 1. 渲染数字概览
      document.getElementById('valUsers').textContent = data.overview.total_registered_users;
      document.getElementById('valDau').textContent = data.overview.active_users_today;
      document.getElementById('valDevices').textContent = data.overview.total_unique_devices;
      document.getElementById('valEvents').textContent = data.overview.total_events_logged;

      // 2. 渲染 PV 柱状图
      const pvLabels = Object.keys(data.page_metrics.views);
      const pvData = Object.values(data.page_metrics.views);
      
      if(pvChartInstance) pvChartInstance.destroy();
      pvChartInstance = new Chart(document.getElementById('pvChart'), {
        type: 'bar',
        data: {
          labels: pvLabels,
          datasets: [{
            label: 'Page Views',
            data: pvData,
            backgroundColor: 'rgba(99, 102, 241, 0.8)',
            borderRadius: 6
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      // 3. 渲染停留时间折线/柱状图
      const timeLabels = Object.keys(data.page_metrics.avg_dwell_time_seconds);
      const timeData = Object.values(data.page_metrics.avg_dwell_time_seconds);

      if(timeChartInstance) timeChartInstance.destroy();
      timeChartInstance = new Chart(document.getElementById('timeChart'), {
        type: 'bar',
        data: {
          labels: timeLabels,
          datasets: [{
            label: 'Avg Seconds',
            data: timeData,
            backgroundColor: 'rgba(16, 185, 129, 0.8)',
            borderRadius: 6
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      // 4. 渲染点击榜单
      const tbody = document.getElementById('clickTableBody');
      tbody.innerHTML = '';
      data.top_clicks.forEach((item, index) => {
        const row = document.createElement('tr');
        row.className = 'border-b border-slate-700/50 hover:bg-slate-700/20 transition-colors';
        row.innerHTML = `
          <td class="px-4 py-4 font-black text-slate-500">#${index + 1}</td>
          <td class="px-4 py-4 text-white font-medium break-all">${item.target}</td>
          <td class="px-4 py-4 text-right text-emerald-400 font-bold">${item.count}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // 初始化加载
    fetchData();
  </script>
</body>
</html>
